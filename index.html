<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV+ – In App öffnen</title>

  <!-- Open Graph – WhatsApp/Telegram Vorschau -->
  <meta property="og:site_name" content="IPTV+">
  <meta property="og:title"     content="In IPTV+ öffnen">
  <meta property="og:description" content="Öffne diesen Inhalt direkt in der IPTV+ App.">
  <meta property="og:image"     content="https://mosa-99.github.io/iptvplus-links/preview.png">
  <meta property="og:type"      content="website">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      background:linear-gradient(135deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%);
      display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
      color:#fff;
    }
    .card {
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:40px 32px;
      max-width:380px; width:90%;
      text-align:center;
    }
    .icon { font-size:64px; margin-bottom:20px; }
    h1 { font-size:24px; font-weight:700; margin-bottom:8px; }
    p  { font-size:15px; color:rgba(255,255,255,.6); margin-bottom:28px; line-height:1.5; }
    .badge {
      display:inline-block;
      padding:4px 12px; border-radius:20px;
      font-size:12px; font-weight:600;
      background:rgba(108,99,255,.2);
      color:#a78bfa;
      margin-bottom:16px;
    }
    .btn {
      display:block;
      padding:16px 32px; border-radius:14px;
      font-size:16px; font-weight:600;
      text-decoration:none; color:#fff;
      margin-bottom:12px; width:100%;
    }
    .btn-primary { background:linear-gradient(90deg,#6C63FF,#3B82F6); }
    .btn-secondary {
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.15);
    }
    small { color:rgba(255,255,255,.35); font-size:12px; margin-top:16px; display:block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">📺</div>
    <div class="badge" id="badge">IPTV+</div>
    <h1 id="title">In IPTV+ öffnen</h1>
    <p   id="desc">Dieser Link führt zu einem Inhalt in der IPTV+ App.</p>

    <a id="open-btn" href="#" class="btn btn-primary">In App öffnen</a>
    <a href="https://apps.apple.com/app/idDEINE_APP_ID" class="btn btn-secondary">
      App herunterladen
    </a>
    <small>IPTV+ – Dein smarter IPTV Player</small>
  </div>

  <script>
    // GitHub Pages does not support server-side routing.
    // 404.html redirects unknown paths as ?p=/movie/163554
    // Direct hits on index.html have the repo prefix in the pathname.

    function getContentPath() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('p')) return params.get('p');
      // Strip repo subfolder prefix if navigated directly
      return window.location.pathname.replace(/^\/iptvplus-links/, '') || '/';
    }

    const path  = getContentPath();                 // e.g. /movie/163554
    const parts = path.split('/').filter(Boolean);  // ["movie", "163554"]
    const type  = parts[0];
    const rest  = parts.slice(1).join('/');

    const icon  = document.getElementById('icon');
    const badge = document.getElementById('badge');
    const title = document.getElementById('title');
    const desc  = document.getElementById('desc');

    if (type === 'movie') {
      icon.textContent  = '🎬';
      badge.textContent = 'Film';
      title.textContent = 'Film in IPTV+ öffnen';
      desc.textContent  = 'Jemand hat einen Film mit dir geteilt. Öffne ihn direkt in der App.';
    } else if (type === 'series') {
      icon.textContent  = '📺';
      badge.textContent = 'Serie';
      title.textContent = 'Serie in IPTV+ öffnen';
      desc.textContent  = 'Jemand hat eine Serie mit dir geteilt. Öffne sie direkt in der App.';
    } else if (type === 'episode') {
      icon.textContent  = '▶️';
      badge.textContent = 'Episode';
      title.textContent = 'Episode in IPTV+ öffnen';
      desc.textContent  = 'Jemand hat eine Episode mit dir geteilt. Öffne sie direkt in der App.';
    }

    const deepLink = type ? `iptvplus://${type}/${rest}` : 'iptvplus://';
    document.getElementById('open-btn').href = deepLink;

    // Auto-attempt to open the app after a short delay
    if (type) {
      setTimeout(() => { window.location = deepLink; }, 400);
    }
  </script>
</body>
</html>
