<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV+ – In App öffnen</title>

  <!-- Open Graph – WhatsApp/Telegram Vorschau -->
  <meta property="og:site_name"   content="IPTV+">
  <meta property="og:title"       content="In IPTV+ öffnen">
  <meta property="og:description" content="Öffne diesen Inhalt direkt in der IPTV+ App.">
  <meta property="og:image"       content="https://mosa-99.github.io/iptvplus-links/preview.png">
  <meta property="og:type"        content="website">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1    { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p     { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 28px; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(90deg, #6C63FF, #3B82F6);
      margin-bottom: 12px;
      width: 100%;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .mac-hint {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    small { color: rgba(255,255,255,0.35); font-size: 12px; margin-top: 16px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📺</div>
    <h1>In IPTV+ öffnen</h1>
    <p id="desc">Dieser Link führt zu einem Inhalt in der IPTV+ App.</p>

    <a id="open-btn" href="#" class="btn">In App öffnen</a>

    <div id="mac-hint" class="mac-hint" style="display:none">
      📱 Öffne diesen Link auf deinem iPhone oder iPad,<br>um direkt in IPTV+ zu springen.
    </div>

    <a href="https://apps.apple.com/app/idDEINE_APP_ID" class="btn btn-secondary">
      App herunterladen
    </a>
    <small>IPTV+ – Dein smarter IPTV Player</small>
  </div>

  <script>
    // ── Resolve the content path ──────────────────────────────────────────────
    // Two entry points:
    //  1) Direct URL:  /iptvplus-links/movie/163554  → served by 404.html which
    //     redirects to  /iptvplus-links/?p=/movie/163554
    //  2) Root index:  /iptvplus-links/  (no path)

    function getContentPath() {
      // Check for redirect query param from 404.html first
      const p = new URLSearchParams(window.location.search).get('p');
      if (p) return p;  // e.g. /movie/163554

      // Strip repo subfolder from direct pathname
      const raw = window.location.pathname;           // /iptvplus-links/movie/163554
      return raw.replace(/^\/iptvplus-links/, '') || '/';
    }

    const path  = getContentPath();                   // /movie/163554
    const parts = path.split('/').filter(Boolean);    // ["movie", "163554"]
    const type  = parts[0];                           // "movie"
    const rest  = parts.slice(1).join('/');           // "163554"

    // ── Update description ────────────────────────────────────────────────────
    const desc = document.getElementById('desc');
    if (type === 'movie')   desc.textContent = '🎬 Jemand hat einen Film mit dir geteilt.';
    if (type === 'series')  desc.textContent = '📺 Jemand hat eine Serie mit dir geteilt.';
    if (type === 'episode') desc.textContent = '▶️ Jemand hat eine Episode mit dir geteilt.';

    // ── Build deep link ───────────────────────────────────────────────────────
    const deepLink = type ? `iptvplus://${type}/${rest}` : 'iptvplus://';
    const btn      = document.getElementById('open-btn');
    btn.href       = deepLink;

    // ── Platform guard: only auto-redirect + show button on iOS ──────────────
    // On macOS/Windows iptvplus:// is not registered → Safari shows an error.
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)
               || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (isIOS && type) {
      // Wire up button click
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        window.location = deepLink;
      });
      // Auto-open after short delay
      setTimeout(function() { window.location = deepLink; }, 300);
    } else {
      // Not iOS – hide the "In App öffnen" button, show the hint instead
      btn.style.display = 'none';
      document.getElementById('mac-hint').style.display = 'block';
    }
  </script>
</body>
</html>
